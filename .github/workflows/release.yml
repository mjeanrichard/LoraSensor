name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Firmware version (e.g. 1.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Bump FIRMWARE_VERSION in config.h
        run: |
          sed -i 's/#define FIRMWARE_VERSION ".*"/#define FIRMWARE_VERSION "${{ inputs.version }}"/' \
            Firmware/LoraSensor/main/config.h
          grep FIRMWARE_VERSION Firmware/LoraSensor/main/config.h

      - name: Build firmware
        working-directory: Firmware/LoraSensor
        run: idf.py build

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Firmware/LoraSensor/main/config.h
          git commit -m "release: v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          files: |
            Firmware/LoraSensor/build/LoraSensor.bin
            Firmware/LoraSensor/build/LoraSensor.elf
