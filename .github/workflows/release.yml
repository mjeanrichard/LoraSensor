name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Firmware version (e.g. 1.1)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Bump FIRMWARE_BASE_VERSION in CMakeLists.txt
        run: |
          sed -i 's/set(FIRMWARE_BASE_VERSION ".*")/set(FIRMWARE_BASE_VERSION "${{ inputs.version }}")/' \
            Firmware/LoraSensor/CMakeLists.txt
          grep FIRMWARE_BASE_VERSION Firmware/LoraSensor/CMakeLists.txt

      - name: Build firmware
        working-directory: Firmware/LoraSensor
        run: |
          . /opt/esp/idf/export.sh
          idf.py -DDEBUG_BUILD=OFF build

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Firmware/LoraSensor/CMakeLists.txt
          git commit -m "release: v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          files: |
            Firmware/LoraSensor/build/LoraSensor.bin
            Firmware/LoraSensor/build/LoraSensor.elf

      - name: Deploy firmware to server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "www.jean-richard.ch" >> ~/.ssh/known_hosts
          scp -i ~/.ssh/deploy_key \
            Firmware/LoraSensor/build/LoraSensor.bin \
            "sftp@www.jean-richard.ch:/sftp/firmware/lora/LoraSensor-v${{ inputs.version }}.bin"
